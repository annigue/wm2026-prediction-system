# render.yaml — NUR Backend (Free) auf Render.
#   DB        → Neon (extern, dauerhaft frei)      → DATABASE_URL / DATABASE_URL_SYNC
#   Frontend  → Vercel (extern, frei)              → setzt NEXT_PUBLIC_API_URL auf die Backend-URL
#
# Free-Tier-Hinweise:
#   - Backend schläft nach ~15 min Inaktivität (Cold Start ~30-60s beim nächsten Aufruf).
#   - 1 Instanz / 1 Worker (passt zu In-Memory-Cache + BackgroundTasks).
#   - MONTE_CARLO_RUNS=30000 (verifiziert gleichwertig zu 100000, spart RAM/CPU).

services:
  - type: web
    name: wm2026-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt          # co-located mit Neon (eu-central) — vermeidet Atlantik-Latenz pro DB-Query
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      # Neon-Connection-String in ZWEI Treiber-URLs aufteilen (Direkt-Endpoint, nicht Pooler!):
      #   DATABASE_URL       = postgresql+asyncpg://USER:PASS@HOST/DB?ssl=require
      #   DATABASE_URL_SYNC  = postgresql+psycopg2://USER:PASS@HOST/DB?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: REDIS_URL
        sync: false               # leer lassen = ohne Cache (graceful)
      - key: ODDS_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
      - key: CORS_ORIGINS
        sync: false               # Vercel-URL, z.B. https://wm2026-prediction-system.vercel.app
      - key: ENV
        value: production
      - key: MONTE_CARLO_RUNS
        value: "100000"          # nur Hintergrund-Sim (blockiert das Interface nicht)
